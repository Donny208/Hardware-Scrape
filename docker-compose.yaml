version: "3"
services:
  worker:
    container_name: hs
    build:
      context: .
      args:
        REFRESH_RATE: ${REFRESH_RATE}
    env_file:
      - .env
    volumes:
      - ./filter.yaml:/app/filter.yaml
      - ./source.yaml:/app/source.yaml
    depends_on:
      - db
  postgres:
    container_name: db
    image: postgres:latest
    ports:
      - 5432:5432
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=donny_password
      - POSTGRES_USER=donny
      - POSTGRES_DB=postgres
    restart: unless-stopped
